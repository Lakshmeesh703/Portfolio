services:
  - type: web
    name: portfolio
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.11.0"
    autoDeploy: true
    routes:
      - path: /
        type: static
      - path: /api
        type: dynamic
